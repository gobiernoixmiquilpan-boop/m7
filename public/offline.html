<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sin conexión · RegulaTierra Capula 2026</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf6f8;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:24px;box-shadow:0 4px 24px rgba(110,17,44,.1);padding:40px 32px;max-width:380px;width:100%;text-align:center}
  .icon{width:72px;height:72px;background:#fef9e7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
  .icon svg{width:36px;height:36px;stroke:#d97706;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  h1{font-size:22px;font-weight:700;color:#1f2937;margin-bottom:8px}
  p{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:24px}
  .pill{display:inline-block;background:#fdf2f5;color:#6e112c;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:20px}
  button{width:100%;background:#6e112c;color:#fff;font-size:15px;font-weight:600;padding:14px;border:none;border-radius:14px;cursor:pointer;transition:background .15s}
  button:hover{background:#8b1534}
  .note{margin-top:16px;font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<div class="card">
  <div class="pill">RegulaTierra Capula 2026</div>
  <div class="icon">
    <svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
  </div>
  <h1>Sin conexión</h1>
  <p>No hay señal en este momento. Si ya comenzaste tu solicitud, <strong>tus datos están guardados</strong> y se enviarán automáticamente cuando recuperes conexión.</p>
  <button onclick="window.location.reload()">Reintentar</button>
  <p class="note">Contraloría Municipal · Ixmiquilpan</p>
</div>
</body>
</html>
